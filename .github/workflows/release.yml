name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Stash runtime assets
        shell: pwsh
        run: |
          if (-not (Test-Path "build/bin/mabidata.db")) {
            throw "build/bin/mabidata.db not found in repository"
          }
          New-Item -ItemType Directory -Force -Path .ci-assets | Out-Null
          Copy-Item "build/bin/mabidata.db" ".ci-assets/mabidata.db"

      - name: Build application
        run: wails build -clean
        env:
          CGO_ENABLED: 0

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content wails.json -Raw | ConvertFrom-Json).info.productVersion
          $packageDir = "release-package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "build/bin/BlonyMonitorV2.exe" $packageDir/
          Copy-Item ".ci-assets/mabidata.db" $packageDir/
          Copy-Item -Recurse "sounds" $packageDir/

          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $suffix = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $suffix = "manual-${{ github.run_number }}"
          } else {
            $suffix = "dev-${{ github.run_number }}"
          }

          $zipName = "BlonyMonitorV2-${version}-windows-amd64-${suffix}.zip"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Determine release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "type=manual" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "tag=manual-${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "name=BlonyMonitorV2 Manual Build #${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } elseif ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            "type=version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "tag=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "name=BlonyMonitorV2 ${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "type=dev" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "tag=dev-latest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "name=BlonyMonitorV2 Dev Build" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Publish version release
        if: steps.meta.outputs.type == 'version'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}

      - name: Publish dev release
        if: steps.meta.outputs.type == 'dev'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            自动构建（main 分支最新提交）

            - 版本：${{ steps.package.outputs.version }}
            - Commit：${{ github.sha }}
            - Workflow：[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          prerelease: ${{ steps.meta.outputs.prerelease }}
          makeLatest: false
          artifacts: ${{ steps.package.outputs.zip_name }}

      - name: Publish manual release
        if: steps.meta.outputs.type == 'manual'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}
